<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo Stream</title>
    <style>
        /* Estilos base del sistema */
        body {
            background-color: #0f172a;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 20px;
            color: #94a3b8;
            font-size: 16px;
        }
        @media (min-width: 768px) {
            body { padding: 50px; }
        }
        .radio-card {
            max-width: 900px;
            margin: 0 auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        @media (min-width: 768px) {
            .radio-card { padding: 30px; }
        }
        .main-title {
            color: #f8fafc;
            text-align: center;
            font-size: 26px;
            margin-bottom: 5px;
            font-weight: 800;
        }
        .main-subtitle {
            color: #38bdf8;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 13px;
        }
        .login-container {
            max-width: 450px;
            margin: 0 auto;
            background: #0f172a;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }
        .radio-header-icon {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
        }
        .login-container h2 {
            color: #f8fafc;
            margin: 0 0 5px 0;
            font-size: 20px;
        }
        .login-container p {
            color: #64748b;
            margin: 0 0 20px 0;
            font-size: 14px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        input {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 14px;
            outline: none;
            width: -webkit-fill-available;
            width: fill-available;
        }
        input:focus {
            border-color: #38bdf8;
        }
        .btn-primary {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }
        .link-footer {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 13px;
            text-decoration: underline;
            padding: 5px;
        }
        .link-blue {
            color: #38bdf8;
        }
        .streams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }
        .stream-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
    </style>
</head>
<body>

    <div class="radio-card">
        <h1 class="main-title">UNIVERSO STREAM</h1>
        <p class="main-subtitle">Tu plataforma de Multitransmisión en Vivo</p>

        <!-- PANTALLA: LOGIN -->
        <div id="loginBox" class="login-container" style="display:block;">
            <span class="radio-header-icon">🔒</span>
            <h2>Iniciar Sesión</h2>
            <p>Ingresá al panel de control</p>
            <div class="input-section">
                <div class="form-group">
                    <input type="text" id="usuario" placeholder="Usuario" oninput="verificarCampos()">
                    <input type="password" id="clave" placeholder="Contraseña" oninput="verificarCampos()">
                </div>
                <button id="botonIngresar" class="btn-primary" disabled onclick="entrarAlSistema()">Ingresar al Panel</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 15px;">
                <button class="link-footer" onclick="mostrarPantalla('recoverBox')">¿Olvidaste tu contraseña?</button>
                <button class="link-footer link-blue" onclick="mostrarPantalla('registerBox')">¿No tenés cuenta? Registrate</button>
            </div>
        </div>

        <!-- PANTALLA: REGISTRO -->
        <div id="registerBox" class="login-container" style="display:none;">
            <span class="radio-header-icon">📝</span>
            <h2>Crear Cuenta</h2>
            <p>Registrate para acceder a la plataforma</p>
            <div class="input-section">
                <div class="form-group">
                    <input type="text" id="regUsuario" placeholder="Escribí un Usuario">
                    <input type="password" id="regClave" placeholder="Escribí una Contraseña">
                </div>
                <button class="btn-primary" onclick="guardarRegistro()">Registrarse</button>
            </div>
            <button class="link-footer" onclick="mostrarPantalla('loginBox')" style="margin-top: 15px;">¿Ya tenés cuenta? Iniciá Sesión</button>
        </div>

        <!-- PANTALLA: RECUPERACIÓN -->
        <div id="recoverBox" class="login-container" style="display:none;">
            <span class="radio-header-icon">🔑</span>
            <h2>Recuperar Clave</h2>
            <p>Ingresá tu usuario para restablecer</p>
            <div class="input-section">
                <div class="form-group">
                    <input type="text" id="recUsuario" placeholder="Tu Usuario">
                </div>
                <button class="btn-primary" onclick="alert('✉️ Si el usuario existe, se enviaron las instrucciones.')">Restablecer Contraseña</button>
            </div>
            <button class="link-footer" onclick="mostrarPantalla('loginBox')" style="margin-top: 15px;">Volver al Inicio</button>
        </div>

        <!-- PANTALLA: PANEL DE CONTROL -->
        <div id="panelBox" style="display:none; margin-top: 10px; padding: 20px; border-radius: 12px; background: #0f172a; border: 1px solid #334155;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: #fff; margin: 0; font-size: 18px;">🎛️ Panel de Control</h3>
                <button class="link-footer link-blue" onclick="cerrarSesion()" style="text-decoration: none; font-weight: bold;">🚪 Cerrar Sesión</button>
            </div>
            <div class="form-group">
                <input type="text" id="streamTag" placeholder="Nombre de la transmisión">
                <input type="text" id="streamUrl" placeholder="Enlace de YouTube o directo">
            </div>
            <div style="display: flex; gap: 12px; margin-bottom: 10px;">
                <button class="btn-primary" onclick="agregarStream()">➕ Agregar Transmisión</button>
                <button class="btn-primary" style="background: #ef4444; color: white;" onclick="iniciarTodoMuted()">🔊 Iniciar Todo (Muted)</button>
            </div>
            
            <div id="streamsGrid" class="streams-grid"></div>
        </div>

                </div>
                <script>
    // Variables globales sincronizadas con el almacenamiento del navegador
    let listaStreams = JSON.parse(localStorage.getItem('multiStreamList')) || [];
    let likesData = JSON.parse(localStorage.getItem('likesData')) || {};

    // Al cargar la página, se resetean los inputs para evitar datos guardados
    document.addEventListener("DOMContentLoaded", () => {
        if(document.getElementById('usuario')) document.getElementById('usuario').value = "";
        if(document.getElementById('clave')) document.getElementById('clave').value = "";
        verificarCampos();
    });

    // 1. Control de navegación limpia entre pantallas
    function mostrarPantalla(pantallaId) {
        const pantallas = ['loginBox', 'registerBox', 'recoverBox', 'panelBox'];
        pantallas.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = (id === pantallaId) ? 'block' : 'none';
        });
    }

    // 2. Validación en tiempo real de los campos del Login
    function verificarCampos() {
        const usuario = document.getElementById('usuario')?.value.trim() || "";
        const clave = document.getElementById('clave')?.value.trim() || "";
        const boton = document.getElementById('botonIngresar');
        
        if (boton) {
            boton.disabled = (usuario === "" || clave === "");
        }
    }

    // 3. Sistema de Registro seguro en Memoria Local
    function guardarRegistro() {
        const regUser = document.getElementById('regUsuario').value.trim();
        const regPass = document.getElementById('regClave').value.trim();

        if (regUser === "" || regPass === "") {
            alert("❌ Por favor, completá todos los campos del registro.");
            return;
        }

        localStorage.setItem('usuarioRegistrado', regUser);
        localStorage.setItem('claveRegistrada', regPass);
        
        alert("✅ ¡Registro exitoso! Ya podés iniciar sesión con tus datos.");
        mostrarPantalla('loginBox');
        
        document.getElementById('usuario').value = regUser;
        verificarCampos();
    }

    // 4. Lógica de Inicio de Sesión e ingreso al Panel
    function entrarAlSistema() {
        const usuario = document.getElementById('usuario').value.trim();
        const clave = document.getElementById('clave').value.trim();

        const usuarioValido = localStorage.getItem('usuarioRegistrado');
        const claveValida = localStorage.getItem('claveRegistrada');

        if (!usuarioValido) {
            alert("❌ No hay cuentas creadas en este navegador. Registrate primero.");
            return;
        }

        if (usuario === usuarioValido && clave === claveValida) {
            alert("🔑 ¡Acceso concedido! Bienvenido.");
            
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('panelBox').style.display = 'block';
            
            renderizarTodasLasTransmisiones();
        } else {
            alert("❌ Credenciales incorrectas. Verificá los datos.");
            document.getElementById('clave').value = "";
            verificarCampos();
        }
    }

    // 5. Cierre de sesión limpio
    function cerrarSesion() {
        document.getElementById('usuario').value = "";
        document.getElementById('clave').value = "";
        mostrarPantalla('loginBox');
        verificarCampos();
    }

    // 6. EXTRACCIÓN DE ID UNIVERSAL MEDIANTE EXPRESIÓN REGULAR NATIVA
    function extraerId(url) {
        if (!url) return null;
        try {
            // Expresión regular para aislar el ID de 11 caracteres de YouTube en cualquier formato
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|live\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            
            // Si hay coincidencia y tiene los 11 caracteres exactos, los devuelve
            if (match && match[2].length === 11) {
                return match[2];
            }
        } catch (e) {
            console.error("Error al extraer el ID de video:", e);
        }
        return null;
    }

    // 7. Lanzamiento colectivo de transmisiones (Muted)
    function iniciarTodoMuted() {
        if (listaStreams.length === 0) return;
        
        listaStreams.forEach(stream => {
            const vid = document.getElementById(`vid-${stream.id}`);
            if (vid) {
                if (vid.tagName === 'IFRAME') {
                    let srcLimpio = vid.src.split('?')[0];
                    vid.src = `${srcLimpio}?autoplay=1&mute=1&enablejsapi=1`;
                } else if (vid.tagName === 'VIDEO') {
                    vid.currentTime = 0;
                    vid.muted = true;
                    vid.play().catch(e => console.log("Error al reproducir video nativo:", e));
                }
            }
        });
        alert("🔊 Transmisiones iniciadas de manera muteada.");
    }

    // 8. Control interactivo de likes
    function darLike(id) {
        if (!likesData[id]) likesData[id] = 0;
        likesData[id]++;
        document.getElementById(`like-${id}`).textContent = likesData[id];
        guardarLikes();
    }

    // 9. Procesamiento y guardado de nuevos streams
    function agregarStream() {
        const tag = document.getElementById('streamTag').value.trim();
        const url = document.getElementById('streamUrl').value.trim();
        
        if (!tag || !url) { 
            alert("❌ Completá el nombre y el enlace de la transmisión."); 
            return; 
        }

        listaStreams.push({ id: Date.now(), tag: tag, url: url });
        guardarEnMemoria();
        renderizarTodasLasTransmisiones();
        
        document.getElementById('streamTag').value = "";
        document.getElementById('streamUrl').value = "";
    }

    // 10. Eliminación de streams de la lista y memoria
    function eliminarStream(id) {
        listaStreams = listaStreams.filter(s => s.id !== id);
        delete likesData[id];
        guardarEnMemoria();
        guardarLikes();
        renderizarTodasLasTransmisiones();
    }

    function guardarEnMemoria() {
        localStorage.setItem('multiStreamList', JSON.stringify(listaStreams));
    }

    function guardarLikes() {
        localStorage.setItem('likesData', JSON.stringify(likesData));
    }

    // 11. Renderizado Dinámico de la Grilla de Videos
    function renderizarTodasLasTransmisiones() {
        const grid = document.getElementById('streamsGrid');
        if (!grid) return;
        
        grid.innerHTML = ""; 

        if (listaStreams.length === 0) {
            grid.innerHTML = "<p style='text-align:center; color:#64748b; grid-column:1/-1; padding:20px; font-size:14px;'>No hay transmisiones añadidas. Agregá una en el formulario de arriba.</p>";
            return;
        }

        listaStreams.forEach(stream => {
            if (!likesData[stream.id]) likesData[stream.id] = 0;
            const videoId = extraerId(stream.url);
            
            const card = document.createElement('div');
            card.className = "stream-card";

            let reproductorHTML = "";
            if (videoId) {
                // Inserta el reproductor nativo embebido de YouTube de forma correcta
                reproductorHTML = `<iframe id="vid-${stream.id}" width="100%" height="200" src="https://youtube.com{videoId}?enablejsapi=1&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="border-radius:6px; background:#000;"></iframe>`;
            } else {
                // Respaldo por si se ingresa un enlace directo a archivo .mp4
                reproductorHTML = `<video id="vid-${stream.id}" src="${stream.url}" controls width="100%" height="200" style="border-radius:6px; background:#000;"></video>`;
            }

            card.innerHTML = `
                <h4 style="color:#f8fafc; margin:0; font-size:15px; font-weight:600;">${stream.tag}</h4>
                ${reproductorHTML}
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:4px;">
                    <button class="btn-primary" style="width:auto; padding:8px 14px; background:#10b981; color:#0f172a;" onclick="darLike(${stream.id})">
                        👍 Likes: <span id="like-${stream.id}">${likesData[stream.id]}</span>
                    </button>
                    <button class="btn-primary" style="width:auto; padding:8px 14px; background:#ef4444; color:white;" onclick="eliminarStream(${stream.id})">
                        🗑️ Eliminar
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
    }
</script>
</body>
</html>
