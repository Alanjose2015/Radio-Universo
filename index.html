<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo Stream</title>
    <style>
        /* Estilos base del sistema */
        body {
            background-color: #0f172a;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 50px;
            color: #94a3b8;
            font-size: 16px;
        }
        .radio-card {
            max-width: 900px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .main-title {
            color: #f8fafc;
            text-align: center;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .main-subtitle {
            color: #38bdf8;
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .login-container {
            max-width: 450px;
            margin: 0 auto;
            background: #0f172a;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }
        .radio-header-icon {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
        }
        .login-container h2 {
            color: #f8fafc;
            margin: 0 0 5px 0;
            font-size: 20px;
        }
        .login-container p {
            color: #64748b;
            margin: 0 0 20px 0;
            font-size: 14px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        input {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 14px;
            outline: none;
        }
        input:focus {
            border-color: #38bdf8;
        }
        .btn-primary {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }
        .link-footer {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 13px;
            text-decoration: underline;
            padding: 5px;
        }
        .link-blue {
            color: #38bdf8;
        }
        .streams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .stream-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="radio-card">
        <h1 class="main-title">UNIVERSO STREAM</h1>
        <p class="main-subtitle">Tu plataforma de Multitransmisión en Vivo</p>

        <!-- PANTALLA: INICIO DE SESIÓN -->
        <div id="loginBox" class="login-container" style="display:block;">
            <span class="radio-header-icon">🔒</span>
            <h2>Iniciar Sesión</h2>
            <p>Ingresá al panel de control</p>
            <div class="input-section" style="margin-bottom: 0;">
                <div class="form-group">
                    <input type="text" id="usuario" placeholder="Usuario" oninput="verificarCampos()">
                    <input type="password" id="clave" placeholder="Contraseña" oninput="verificarCampos()">
                </div>
                <button id="botonIngresar" class="btn-primary" disabled onclick="entrarAlSistema()">Ingresar al Panel</button>
            </div>
            <div class="text-center" style="display: flex; flex-direction: column; gap: 5px; margin-top: 15px;">
                <button class="link-footer" onclick="mostrarPantalla('recoverBox')">¿Olvidaste tu contraseña?</button>
                <button class="link-footer link-blue" onclick="mostrarPantalla('registerBox')">¿No tenés cuenta? Registrate</button>
            </div>
        </div>

        <!-- PANTALLA: REGISTRO -->
        <div id="registerBox" class="login-container" style="display:none;">
            <span class="radio-header-icon">📝</span>
            <h2>Crear Cuenta</h2>
            <p>Registrate para acceder a la plataforma</p>
            <div class="input-section">
                <div class="form-group">
                    <input type="text" id="regUsuario" placeholder="Escribí un Usuario">
                    <input type="password" id="regClave" placeholder="Escribí una Contraseña">
                </div>
                <button class="btn-primary" onclick="guardarRegistro()">Registrarse</button>
            </div>
            <button class="link-footer" onclick="mostrarPantalla('loginBox')" style="margin-top: 15px;">¿Ya tenés cuenta? Iniciá Sesión</button>
        </div>

        <!-- PANTALLA: RECUPERAR CONTRASEÑA -->
        <div id="recoverBox" class="login-container" style="display:none;">
            <span class="radio-header-icon">🔑</span>
            <h2>Recuperar Clave</h2>
            <p>Ingresá tu usuario para restablecer</p>
            <div class="input-section">
                <div class="form-group">
                    <input type="text" id="recUsuario" placeholder="Tu Usuario">
                </div>
                <button class="btn-primary" onclick="alert('✉️ Si el usuario existe, se enviaron las instrucciones.')">Restablecer Contraseña</button>
            </div>
            <button class="link-footer" onclick="mostrarPantalla('loginBox')" style="margin-top: 15px;">Volver al Inicio</button>
        </div>

        <!-- PANTALLA: PANEL OPERATIVO (Aparece al loguearse) -->
        <div id="panelBox" style="display:none; margin-top: 20px; padding: 20px; border-radius: 12px; background: #0f172a; border: 1px solid #334155;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="color: #fff; margin: 0;">🎛️ Panel de Control de Transmisiones</h3>
                <button class="link-footer link-blue" onclick="cerrarSesion()" style="text-decoration: none; font-weight: bold;">🚪 Cerrar Sesión</button>
            </div>
            <div class="form-group">
                <input type="text" id="streamTag" placeholder="Nombre de la transmisión">
                <input type="text" id="streamUrl" placeholder="Enlace de YouTube (Ej: https://youtube.com...)">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" onclick="agregarStream()">➕ Agregar Transmisión</button>
                <button class="btn-primary" style="background: #ef4444; color: white;" onclick="iniciarTodoMuted()">🔊 Iniciar Todo (Muted)</button>
            </div>
            
            <!-- Contenedor dinámico donde se inyectan los videos -->
            <div id="streamsGrid" class="streams-grid"></div>
        </div>

    </div> <!-- Cierre de .radio-card -->
    <script>
    // Variables globales (Sincronizadas con localStorage)
    let listaStreams = JSON.parse(localStorage.getItem('multiStreamList')) || [];
    let likesData = JSON.parse(localStorage.getItem('likesData')) || {};

    // Al cargar la página, limpiamos los campos y validamos el estado inicial del botón
    document.addEventListener("DOMContentLoaded", () => {
        if(document.getElementById('usuario')) document.getElementById('usuario').value = "";
        if(document.getElementById('clave')) document.getElementById('clave').value = "";
        verificarCampos();
    });

    // 1. Control de navegación entre pantallas
    function mostrarPantalla(pantallaId) {
        const pantallas = ['loginBox', 'registerBox', 'recoverBox', 'panelBox'];
        pantallas.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = (id === pantallaId) ? 'block' : 'none';
        });
    }

    // 2. Validación en tiempo real para activar el botón de login
    function verificarCampos() {
        const usuario = document.getElementById('usuario')?.value.trim() || "";
        const clave = document.getElementById('clave')?.value.trim() || "";
        const boton = document.getElementById('botonIngresar');
        
        if (boton) {
            boton.disabled = (usuario === "" || clave === "");
        }
    }

    // 3. Sistema de Registro Local
    function guardarRegistro() {
        const regUser = document.getElementById('regUsuario').value.trim();
        const regPass = document.getElementById('regClave').value.trim();

        if (regUser === "" || regPass === "") {
            alert("❌ Por favor, completá todos los campos del registro.");
            return;
        }

        localStorage.setItem('usuarioRegistrado', regUser);
        localStorage.setItem('claveRegistrada', regPass);
        
        alert("✅ ¡Registro exitoso! Ya podés iniciar sesión con tus datos.");
        mostrarPantalla('loginBox');
        
        document.getElementById('usuario').value = regUser;
        verificarCampos();
    }

    // 4. Validación de Entrada al Sistema
    function entrarAlSistema() {
        const usuario = document.getElementById('usuario').value.trim();
        const clave = document.getElementById('clave').value.trim();

        const usuarioValido = localStorage.getItem('usuarioRegistrado');
        const claveValida = localStorage.getItem('claveRegistrada');

        if (!usuarioValido) {
            alert("❌ No hay cuentas creadas en este navegador. Registrate primero.");
            return;
        }

        if (usuario === usuarioValido && clave === claveValida) {
            alert("🔑 ¡Acceso concedido! Bienvenido.");
            
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('panelBox').style.display = 'block';
            
            renderizarTodasLasTransmisiones();
        } else {
            alert("❌ Credenciales incorrectas. Verificá los datos.");
            document.getElementById('clave').value = "";
            verificarCampos();
        }
    }

    // 5. Cierre de Sesión (Vuelve al inicio de manera limpia)
    function cerrarSesion() {
        document.getElementById('usuario').value = "";
        document.getElementById('clave').value = "";
        mostrarPantalla('loginBox');
        verificarCampos();
    }

    // 6. Funciones Operativas de Transmisiones (Tus funciones originales reparadas)
    function iniciarTodoMuted() {
        if (listaStreams.length === 0) return;
        
        listaStreams.forEach(stream => {
            const vid = document.getElementById(`vid-${stream.id}`);
            if (vid) {
                if (vid.tagName === 'IFRAME') {
                    let baseUrl = vid.src.split('?')[0];
                    vid.src = `${baseUrl}?autoplay=1&mute=0&rel=0&t=0`;
                } else if (vid.tagName === 'VIDEO') {
                    vid.currentTime = 0;
                    vid.play().catch(e => {
                        console.log("Error reproduciendo:", e);
                        vid.muted = false;
                        vid.play();
                    });
                }
            }
        });
        alert("✅ SI LA TRANSMISIÓN YA ESTÁ EN VIVO, AHORA ESTÁ INICIADA. Si dice 'esperando', es porque aún no empezó.");
    }

    function extraerId(url) {
        try {
            if (url.includes('/live/')) return url.split('/live/')[1].split(/[?#]/)[0];
            if (url.includes('v=')) return new URLSearchParams(new URL(url).search).get('v');
            if (url.includes('youtu.be/')) return url.split('youtu.be/')[1].split(/[?#]/)[0];
        } catch (e) {
            console.error("Error al extraer ID de URL:", e);
        }
        return null;
    }

    function cambiarVolumen(id, val) {
        const vid = document.getElementById(`vid-${id}`);
        if (vid && vid.tagName === 'VIDEO') vid.volume = val / 100;
    }

    function darLike(id) {
        if (!likesData[id]) likesData[id] = 0;
        likesData[id]++;
        document.getElementById(`like-${id}`).textContent = likesData[id];
        guardarLikes();
    }

    function agregarStream() {
        const tag = document.getElementById('streamTag').value.trim();
        const url = document.getElementById('streamUrl').value.trim();
        if (!tag || !url) { alert("Completá nombre y enlace."); return; }

        listaStreams.push({ id: Date.now(), tag: tag, url: url });
        guardarEnMemoria();
        renderizarTodasLasTransmisiones();
        document.getElementById('streamTag').value = "";
        document.getElementById('streamUrl').value = "";
    }

    function eliminarStream(id) {
        listaStreams = listaStreams.filter(s => s.id !== id);
        delete likesData[id];
        guardarEnMemoria();
        renderizarTodasLasTransmisiones();
    }

    function guardarEnMemoria() {
        localStorage.setItem('multiStreamList', JSON.stringify(listaStreams));
    }

    // 7. Renderizado Dinámico de la Grilla de Videos
    function renderizarTodasLasTransmisiones() {
        const grid = document.getElementById('streamsGrid');
        if (!grid) return;
        
        grid.innerHTML = ""; 

        if (listaStreams.length === 0) {
            grid.innerHTML = "<p style='text-align:center; color:#64748b; grid-column:1/-1; padding: 20px;'>No hay transmisiones activas. Agregá una arriba.</p>";
            return;
        }

        listaStreams.forEach(stream => {
            if (!likesData[stream.id]) likesData[stream.id] = 0;
            const videoId = extraerId(stream.url);
            
            const card = document.createElement('div');
            card.className = "stream-card";

            let reproductorHTML = "";
            if (videoId) {
                reproductorHTML = `<iframe id="vid-${stream.id}" width="100%" height="200" src="https://youtube.com{videoId}?enablejsapi=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="border-radius:6px;"></iframe>`;
            } else {
                reproductorHTML = `<video id="vid-${stream.id}" src="${stream.url}" controls width="100%" height="200" style="border-radius:6px; background:black;"></video>`;
            }

            card.innerHTML = `
                <h4 style="color:#f8fafc; margin:0; font-size:16px;">${stream.tag}</h4>
                ${reproductorHTML}
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                    <button class="btn-primary" style="width:auto; padding:6px 12px; background:#10b981; color:white;" onclick="darLike(${stream.id})">
                        👍 Likes: <span id="like-${stream.id}">${likesData[stream.id]}</span>
                    </button>
                    <button class="btn-primary" style="width:auto; padding:6px 12px; background:#ef4444; color:white;" onclick="eliminarStream(${stream.id})">
                        🗑️ Eliminar
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function guardarLikes() {
        localStorage.setItem('likesData', JSON.stringify(likesData));
    }
</script>
</body>
</html>
